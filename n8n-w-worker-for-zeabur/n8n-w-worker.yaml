apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: N8N v2 with Worker & Task Runners
spec:
  description: N8N v2 workflow automation with worker and external task runners for secure code execution
  icon: https://i.imgur.com/KUcP61Z.png
  coverImage: https://i.imgur.com/Hm4GdsP.png
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: What is the domain you want for your N8N instance?
  tags:
    - Automation
    - Workflow
    - N8N v2
    - Task Runners
    - Code Execution
  readme: |-
    # N8N v2 with Worker & Task Runners (create by SEAFOODHOLDHAND)

    [![N8N with Worker](https://i.imgur.com/gi4FDrn.png)](https://www.youtube.com/@seafoodholdhand)

    **N8N v2** is a powerful workflow automation platform that helps you connect different services and automate tasks. This template includes:

    - **N8N v2 main instance** for workflow management (latest version)
    - **N8N worker** for processing background tasks
    - **External Task Runners** for secure Code node execution (production-ready setup)
    - **PostgreSQL** database for data storage
    - **Redis** for queue management

    ## Why External Task Runners?

    This template uses **external task runners** - N8N's recommended production setup for executing code in Code nodes:

    - **🔒 Enhanced Security**: Code runs in isolated containers, separate from your main N8N instance
    - **⚡ Better Performance**: Task runners can scale independently based on workload
    - **🛡️ Sandboxed Execution**: JavaScript and Python code execute in controlled environments
    - **🔄 Auto-Shutdown**: Idle runners automatically shut down after 15 seconds to save resources
    - **📊 Production Ready**: Follows N8N's best practices for production deployments

    With N8N v2, you can:
    - Create automated workflows with the visual editor
    - Connect to hundreds of services and APIs
    - Execute custom JavaScript and Python code securely in Code nodes
    - Process data and automate tasks with reliable background workers
    - Handle webhook-triggered workflows efficiently

    The worker + task runner setup ensures your automation tasks are processed reliably and securely.

    ## Update Log

    ### 2026-03-23
    - Fixed service dependencies placement to comply with Zeabur template schema (moved from inside `spec` to service level), ensuring correct startup ordering
    - Removed deprecated `N8N_RUNNERS_ENABLED` environment variable (task runners are enabled by default in N8N v2)
    - **Fixed task runner architecture**: Split single `Runners` into `N8N-Runners` (connects to `http://N8N:5679`) and `Worker-Runners` (connects to `http://Worker:5679`), matching the official n8n docker-compose setup where each n8n instance needs its own dedicated runner

    ### 2025-12-28
    - **IMPORTANT**: Template updated for N8N v2 compatibility
    - Upgraded to external task runners (production-recommended setup)
    - Added separate `task-runners` service as a sidecar to n8n-worker
    - Configured `N8N_RUNNERS_MODE=external` for better security and performance
    - Task runners now execute Code node JavaScript/Python code in isolated containers
    - Added `TASK_RUNNERS_AUTH_TOKEN` variable for secure broker-runner authentication

    This update ensures your N8N v2 workflows run securely with external task runners, following N8N's best practices for production deployments.

    ### 2025-03-17
    - Fixed N8N_ENCRYPTION_KEY mismatch between n8n main instance and worker
    - Ensured worker uses the same encryption key as main instance for improved system stability
    - Added ability to manually set `N8N_ENCRYPTION_KEY` for both main instance and workers

    ⚠️ Important: If you're using a previous version of this template, please update to this version to avoid potential encryption key synchronization issues.

    Note: This template enables critical environment variables to prevent future compatibility issues:

    - `N8N_RUNNERS_MODE=external`: Uses external task runner containers (recommended for production) instead of internal child processes.

    - `OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true`: Running manual executions in the main instance in scaling mode is deprecated. Manual executions will be routed to workers in a future version. This setting prepares your deployment for this change.

    Learn more about task runners: https://docs.n8n.io/hosting/configuration/task-runners/

    This template has been logically designed and tested to work successfully. As a nocode user, I welcome any suggestions or improvements on GitHub. I'll do my best to update the template (with AI's help) since I'm not very familiar with GitHub.

    If you encounter any issues during deployment, please let me know via GitHub issues:
    [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
  services:
    - name: PostgreSQL
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:17
          command:
            - docker-entrypoint.sh
            - -c
            - config_file=/etc/postgresql/postgresql.conf
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        instructions:
          - type: TEXT
            title: Connection String
            content: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${PORT_FORWARDED_HOSTNAME}:${DATABASE_PORT_FORWARDED_PORT}/${POSTGRES_DATABASE}
          - type: TEXT
            title: PostgreSQL Connect Command
            content: psql "postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${PORT_FORWARDED_HOSTNAME}:${DATABASE_PORT_FORWARDED_PORT}/${POSTGRES_DATABASE}"
          - type: TEXT
            title: PostgreSQL username
            content: ${POSTGRES_USERNAME}
            category: Credentials
          - type: PASSWORD
            title: PostgresSQL password
            content: ${POSTGRES_PASSWORD}
            category: Credentials
          - type: TEXT
            title: PostgresSQL database
            content: ${POSTGRES_DATABASE}
            category: Credentials
          - type: TEXT
            title: PostgreSQL host
            content: ${PORT_FORWARDED_HOSTNAME}
            category: Hostname & Port
          - type: TEXT
            title: PostgreSQL port
            content: ${DATABASE_PORT_FORWARDED_PORT}
            category: Hostname & Port
        env:
          PGDATA:
            default: /var/lib/postgresql/data/pgdata
            expose: false
          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}
            expose: false
          POSTGRES_DATABASE:
            default: ${POSTGRES_DB}
            expose: true
          POSTGRES_DB:
            default: zeabur
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
          POSTGRES_URI:
            default: ${POSTGRES_CONNECTION_STRING}
            expose: true
          POSTGRES_USER:
            default: root
            expose: false
          POSTGRES_USERNAME:
            default: ${POSTGRES_USER}
            expose: true
        configs:
          - path: /etc/postgresql/postgresql.conf
            template: |
              # https://github.com/postgres/postgres/blob/master/src/backend/utils/misc/postgresql.conf.sample
              listen_addresses = '*'
              max_connections = 100
              shared_buffers = 128MB
              dynamic_shared_memory_type = posix
              max_wal_size = 1GB
              min_wal_size = 80MB
              log_timezone = 'Etc/UTC'
              datestyle = 'iso, mdy'
              timezone = 'Etc/UTC'
              lc_messages = 'en_US.utf8'
              lc_monetary = 'en_US.utf8'
              lc_numeric = 'en_US.utf8'
              lc_time = 'en_US.utf8'
              default_text_search_config = 'pg_catalog.english'
            permission: null
            envsubst: null
    - name: N8N
      icon: https://i.imgur.com/KUcP61Z.png
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - PostgreSQL
        - Redis
      spec:
        source:
          image: n8nio/n8n:stable
        ports:
          - id: web
            port: 5678
            type: HTTP
          - id: taskbroker
            port: 5679
            type: TCP
        volumes:
          - id: data
            dir: /root/.n8n
        instructions:
          - type: PASSWORD
            title: N8N ENCRYPTION KEY
            content: ${N8N_ENCRYPTION_KEY}
            category: Credentials
          - type: PASSWORD
            title: N8N RUNNERS AUTH TOKEN
            content: ${N8N_RUNNERS_AUTH_TOKEN}
            category: Credentials
        env:
          DB_POSTGRESDB_DATABASE:
            default: ${POSTGRES_DB}
            expose: false
          DB_POSTGRESDB_HOST:
            default: ${POSTGRES_HOST}
            expose: false
          DB_POSTGRESDB_PASSWORD:
            default: ${POSTGRES_PASSWORD}
            expose: false
          DB_POSTGRESDB_PORT:
            default: ${POSTGRES_PORT}
            expose: false
          DB_POSTGRESDB_USER:
            default: ${POSTGRES_USERNAME}
            expose: false
          DB_TYPE:
            default: postgresdb
            expose: false
          EXECUTIONS_MODE:
            default: queue
            expose: false
          N8N_ENCRYPTION_KEY:
            default: ${PASSWORD}
            expose: false
          N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
            default: "true"
            expose: false
          N8N_HOST:
            default: ${ZEABUR_WEB_DOMAIN}
            expose: false
          NODE_ENV:
            default: production
            expose: false
          QUEUE_BULL_REDIS_HOST:
            default: ${REDIS_HOST}
            expose: false
          QUEUE_BULL_REDIS_PASSWORD:
            default: ${REDIS_PASSWORD}
            expose: false
          QUEUE_BULL_REDIS_PORT:
            default: ${REDIS_PORT}
            expose: false
          WEBHOOK_URL:
            default: ${ZEABUR_WEB_URL}
            expose: false
          OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS:
            default: "true"
            expose: false
          N8N_RUNNERS_MODE:
            default: external
            expose: false
          N8N_RUNNERS_BROKER_LISTEN_ADDRESS:
            default: 0.0.0.0
            expose: false
          N8N_RUNNERS_AUTH_TOKEN:
            default: ${PASSWORD}
            expose: false
          N8N_ENCRYPTION_KEY_WORKER:
            default: ${N8N_ENCRYPTION_KEY}
            expose: true
          TASK_RUNNERS_AUTH_TOKEN:
            default: ${N8N_RUNNERS_AUTH_TOKEN}
            expose: true
        configs: []
    - name: Redis
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/redis.svg
      template: PREBUILT_V2
      spec:
        source:
          image: redis:7-alpine
        ports:
          - id: database
            port: 6379
            type: TCP
        volumes:
          - id: data
            dir: /data
        instructions:
          - type: TEXT
            title: Command to connect to your Redis
            content: redis-cli -h ${PORT_FORWARDED_HOSTNAME} -p ${DATABASE_PORT_FORWARDED_PORT} -a ${REDIS_PASSWORD}
          - type: TEXT
            title: Redis Connection String
            content: redis://:${REDIS_PASSWORD}@${PORT_FORWARDED_HOSTNAME}:${DATABASE_PORT_FORWARDED_PORT}
          - type: PASSWORD
            title: Redis password
            content: ${REDIS_PASSWORD}
            category: Credentials
          - type: TEXT
            title: Redis host
            content: ${PORT_FORWARDED_HOSTNAME}
            category: Hostname & Port
          - type: TEXT
            title: Redis port
            content: ${DATABASE_PORT_FORWARDED_PORT}
            category: Hostname & Port
        env:
          REDIS_ARGS:
            default: --requirepass ${REDIS_PASSWORD}
            expose: false
          REDIS_CONNECTION_STRING:
            default: redis://:${REDIS_PASSWORD}@${REDIS_HOST}:${REDIS_PORT}
            expose: true
          REDIS_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          REDIS_PASSWORD:
            default: ${PASSWORD}
            expose: true
          REDIS_PORT:
            default: ${DATABASE_PORT}
            expose: true
          REDIS_URI:
            default: ${REDIS_CONNECTION_STRING}
            expose: true
        configs: []
    - name: Worker
      icon: https://i.imgur.com/KUcP61Z.png
      template: PREBUILT_V2
      dependencies:
        - N8N
        - PostgreSQL
        - Redis
      spec:
        source:
          image: n8nio/n8n:stable
          command:
            - /bin/sh
          args:
            - -c
            - n8n worker
        ports:
          - id: taskbroker
            port: 5679
            type: TCP
        volumes:
          - id: data
            dir: /root/.n8n
        env:
          DB_POSTGRESDB_DATABASE:
            default: ${POSTGRES_DB}
            expose: false
          DB_POSTGRESDB_HOST:
            default: ${POSTGRES_HOST}
            expose: false
          DB_POSTGRESDB_PASSWORD:
            default: ${POSTGRES_PASSWORD}
            expose: false
          DB_POSTGRESDB_PORT:
            default: ${POSTGRES_PORT}
            expose: false
          DB_POSTGRESDB_USER:
            default: ${POSTGRES_USERNAME}
            expose: false
          DB_TYPE:
            default: postgresdb
            expose: false
          EXECUTIONS_MODE:
            default: queue
            expose: false
          N8N_ENCRYPTION_KEY:
            default: ${N8N_ENCRYPTION_KEY_WORKER}
            expose: false
          N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
            default: "true"
            expose: false
          N8N_HOST:
            default: ${ZEABUR_WEB_DOMAIN}
            expose: false
          NODE_ENV:
            default: production
            expose: false
          QUEUE_BULL_REDIS_HOST:
            default: ${REDIS_HOST}
            expose: false
          QUEUE_BULL_REDIS_PASSWORD:
            default: ${REDIS_PASSWORD}
            expose: false
          QUEUE_BULL_REDIS_PORT:
            default: ${REDIS_PORT}
            expose: false
          WEBHOOK_URL:
            default: ${ZEABUR_WEB_URL}
            expose: false
          OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS:
            default: "true"
            expose: false
          N8N_RUNNERS_MODE:
            default: external
            expose: false
          N8N_RUNNERS_BROKER_LISTEN_ADDRESS:
            default: 0.0.0.0
            expose: false
          N8N_RUNNERS_AUTH_TOKEN:
            default: ${TASK_RUNNERS_AUTH_TOKEN}
            expose: false
        configs: []
    - name: N8N-Runners
      icon: https://i.imgur.com/KUcP61Z.png
      template: PREBUILT_V2
      dependencies:
        - N8N
      spec:
        source:
          image: n8nio/runners:stable
        env:
          N8N_RUNNERS_AUTH_TOKEN:
            default: ${TASK_RUNNERS_AUTH_TOKEN}
            expose: false
          N8N_RUNNERS_TASK_BROKER_URI:
            default: http://N8N:5679
            expose: false
          N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT:
            default: "15"
            expose: false
        configs: []
    - name: Worker-Runners
      icon: https://i.imgur.com/KUcP61Z.png
      template: PREBUILT_V2
      dependencies:
        - Worker
      spec:
        source:
          image: n8nio/runners:stable
        env:
          N8N_RUNNERS_AUTH_TOKEN:
            default: ${TASK_RUNNERS_AUTH_TOKEN}
            expose: false
          N8N_RUNNERS_TASK_BROKER_URI:
            default: http://Worker:5679
            expose: false
          N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT:
            default: "15"
            expose: false
        configs: []
localization:
  zh-TW:
    description: N8N v2 工作流程自動化平台，配備工作程序和外部任務執行器以實現安全代碼執行
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: 網域
        description: 你想將 N8N 綁在哪個網域上？
      - key: TASK_RUNNERS_AUTH_TOKEN
        type: PASSWORD
        name: 任務執行器認證令牌
        description: 任務執行器認證的共享密鑰（若為空則自動生成）
    readme: |-
      # N8N v2 搭配工作程序與任務執行器 (create by SEAFOODHOLDHAND)

      [![N8N with Worker](https://i.imgur.com/gi4FDrn.png)](https://www.youtube.com/@seafoodholdhand)

      **N8N v2** 是一個強大的工作流程自動化平台，可以幫助你連接不同的服務並自動化任務。此模板包含：

      - **N8N v2 主實例**用於工作流程管理（最新版本）
      - **N8N 工作程序**用於處理背景任務
      - **外部任務執行器**用於安全執行 Code 節點（生產環境就緒設置）
      - **PostgreSQL** 資料庫用於數據存儲
      - **Redis** 用於隊列管理

      ## 為什麼使用外部任務執行器？

      此模板使用**外部任務執行器** - N8N 推薦的生產環境設置，用於在 Code 節點中執行代碼：

      - **🔒 增強安全性**：代碼在隔離容器中運行，與主 N8N 實例分開
      - **⚡ 更佳性能**：任務執行器可以根據工作負載獨立擴展
      - **🛡️ 沙盒執行**：JavaScript 和 Python 代碼在受控環境中執行
      - **🔄 自動關閉**：閒置的執行器會在 15 秒後自動關閉以節省資源
      - **📊 生產就緒**：遵循 N8N 生產部署的最佳實踐

      使用 N8N v2，你可以：
      - 使用可視化編輯器創建自動化工作流程
      - 連接數百種服務和 API
      - 在 Code 節點中安全地執行自定義 JavaScript 和 Python 代碼
      - 使用可靠的背景工作程序處理數據並自動化任務
      - 高效處理 Webhook 觸發的工作流程

      工作程序 + 任務執行器設置確保您的自動化任務得到可靠且安全的處理。

      ## 更新日誌

      ### 2026-03-23
      - 修正服務依賴項位置，符合 Zeabur 模板規範（從 `spec` 內部移至服務層級），確保正確的啟動順序
      - 移除已棄用的 `N8N_RUNNERS_ENABLED` 環境變數（N8N v2 預設已啟用任務執行器）
      - **修正任務執行器架構**：將單一 `Runners` 拆分為 `N8N-Runners`（連接 `http://N8N:5679`）和 `Worker-Runners`（連接 `http://Worker:5679`），符合官方 n8n docker-compose 架構，每個 n8n 實例配備獨立的 Runner

      ### 2025-12-28
      - **重要**：模板已更新以支援 N8N v2
      - 升級至外部任務執行器（生產環境推薦設置）
      - 添加了獨立的 `task-runners` 服務作為 n8n-worker 的 sidecar 容器
      - 配置了 `N8N_RUNNERS_MODE=external` 以提供更好的安全性和性能
      - 任務執行器現在在隔離容器中執行 Code 節點的 JavaScript/Python 代碼
      - 添加了 `TASK_RUNNERS_AUTH_TOKEN` 變數用於安全的中介-執行器認證

      此更新確保您的 N8N v2 工作流程使用外部任務執行器安全運行，遵循 N8N 生產部署的最佳實踐。

      ### 2025-03-17
      - 修復了 n8n 主實例和工作程序之間的 N8N_ENCRYPTION_KEY 不匹配問題
      - 確保工作程序使用與主實例相同的加密密鑰，提高系統穩定性
      - 添加了手動設置 `N8N_ENCRYPTION_KEY` 的能力，以確保主實例和工作程序的加密密鑰同步

      ⚠️ 重要：如果您正在使用此模板的舊版本，請更新到此版本以避免可能的加密密鑰同步問題。

      注意：此模板啟用了關鍵的環境變數以防止未來的相容性問題：

      - `N8N_RUNNERS_MODE=external`：使用外部任務執行器容器（生產環境推薦）而非內部子進程。

      - `OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true`：在擴展模式下於主實例執行手動工作流程的方式已被棄用。未來版本中，手動執行將轉由工作程序處理。此設定為此變更做好準備。

      了解更多關於任務執行器的信息：https://docs.n8n.io/hosting/configuration/task-runners/

      如在 Deploy 時遇到任何問題，可以到 Github issue 告訴我，我會盡力解決：
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)

  ja-JP:
    description: N8N v2 ワークフロー自動化プラットフォーム。ワーカーと外部タスクランナーによる安全なコード実行を搭載
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: ドメイン
        description: N8N インスタンスに使用したいドメインは何ですか？
      - key: TASK_RUNNERS_AUTH_TOKEN
        type: PASSWORD
        name: タスクランナー認証トークン
        description: タスクランナー認証の共有シークレット（空の場合は自動生成）
    readme: |-
      # N8N v2 with Worker & Task Runners (create by SEAFOODHOLDHAND)

      [![N8N with Worker](https://i.imgur.com/gi4FDrn.png)](https://www.youtube.com/@seafoodholdhand)

      **N8N v2**は、異なるサービスを接続してタスクを自動化するのに役立つ強力なワークフロー自動化プラットフォームです。このテンプレートには以下が含まれます：

      - **N8N v2 メインインスタンス**（ワークフロー管理用、最新バージョン）
      - **N8N ワーカー**（バックグラウンドタスク処理用）
      - **外部タスクランナー**（Codeノードの安全な実行用、本番環境対応設定）
      - **PostgreSQL**（データストレージ用）
      - **Redis**（キュー管理用）

      ## 外部タスクランナーを使用する理由

      このテンプレートでは**外部タスクランナー**を使用しています - これはCodeノードでコードを実行するためのN8N推奨の本番環境設定です：

      - **🔒 セキュリティ強化**：コードはメインのN8Nインスタンスから分離されたコンテナで実行されます
      - **⚡ パフォーマンス向上**：タスクランナーはワークロードに応じて独立してスケールできます
      - **🛡️ サンドボックス実行**：JavaScriptとPythonコードは制御された環境で実行されます
      - **🔄 自動シャットダウン**：アイドル状態のランナーは15秒後に自動的にシャットダウンしてリソースを節約
      - **📊 本番環境対応**：N8Nの本番デプロイのベストプラクティスに従っています

      N8N v2を使用すると、以下のことが可能です：
      - ビジュアルエディタで自動化されたワークフローを作成
      - 数百のサービスやAPIに接続
      - CodeノードでカスタムJavaScriptとPythonコードを安全に実行
      - 信頼性の高いバックグラウンドワーカーでデータを処理してタスクを自動化
      - Webhookトリガーのワークフローを効率的に処理

      ワーカーとタスクランナーのセットアップにより、自動化タスクが確実かつ安全に処理されます。

      ## アップデート履歴

      ### 2026-03-23
      - サービス依存関係の配置を Zeabur テンプレートスキーマに準拠するよう修正（`spec` 内部からサービスレベルに移動）、正しい起動順序を確保
      - 非推奨の `N8N_RUNNERS_ENABLED` 環境変数を削除（N8N v2 ではタスクランナーがデフォルトで有効）
      - **タスクランナーアーキテクチャを修正**：単一の `Runners` を `N8N-Runners`（`http://N8N:5679` に接続）と `Worker-Runners`（`http://Worker:5679` に接続）に分割。公式 n8n docker-compose に準拠し、各 n8n インスタンスに専用の Runner を配備

      ### 2025-12-28
      - **重要**：テンプレートをN8N v2対応に更新
      - 外部タスクランナーにアップグレード（本番環境推奨設定）
      - n8n-workerのサイドカーとして独立した `task-runners` サービスを追加
      - より良いセキュリティとパフォーマンスのために `N8N_RUNNERS_MODE=external` を設定
      - タスクランナーは、CodeノードのJavaScript/Pythonコードを分離されたコンテナで実行するようになりました
      - 安全なブローカー-ランナー認証のために `TASK_RUNNERS_AUTH_TOKEN` 変数を追加

      このアップデートにより、N8N v2ワークフローが外部タスクランナーで安全に実行され、N8Nの本番デプロイのベストプラクティスに従うようになります。

      ### 2025-03-17
      - n8nメインインスタンスとワーカー間のN8N_ENCRYPTION_KEYの不一致を修正
      - システムの安定性向上のため、ワーカーがメインインスタンスと同じ暗号化キーを使用するように確保
      - 手動設置 `N8N_ENCRYPTION_KEY` 的能力を追加し、主インスタンスとワーカーの暗号化キーを確保

      ⚠️ 重要：このテンプレートの以前のバージョンをご使用の場合は、暗号化キーの同期の問題を避けるため、このバージョンへの更新をお願いします。

      注：このテンプレートは、将来の互換性の問題を防ぐために、重要な環境変数を有効化しています：

      - `N8N_RUNNERS_MODE=external`：内部子プロセスの代わりに外部タスクランナーコンテナを使用します（本番環境推奨）。

      - `OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true`：スケーリングモードでのメインインスタンスでの手動実行は非推奨となっています。将来のバージョンでは、手動実行はワーカーにルーティングされます。この設定は、この変更に備えるものです。

      タスクランナーについて詳しく：https://docs.n8n.io/hosting/configuration/task-runners/

      デプロイ中に問題が発生した場合は、Github issue で教えてください。できる限り解決します：
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)

