    readme: |-
      # OneCLI — AI 代理的密钥保险库(由 SEAFOODHOLDHAND 创建)

      **OneCLI** 是开源的凭证网关,位于你的 AI 代理与外部服务之间。将真实 API 密钥存储在 OneCLI 的加密保险库中,给代理一个 placeholder(如 `FAKE_KEY`),OneCLI 网关会在请求时自动替换为真实凭证 — 代理永远不会看到真实密钥。

      此模板一键部署完整的 OneCLI 实例。

      ## 架构

      ```
      [Zeabur LB] → OneCLI 应用(单一 image,两个进程)
                        ├─ :10254  → Next.js 网页控制台(UI + API)
                        └─ :10255  → Rust 网关(凭证注入代理)
      [PostgreSQL]  → OneCLI 数据库(代理、密钥、审计日志)
      ```

      OneCLI app image(`ghcr.io/onecli/onecli:latest`)包含:
      - **Next.js 网页控制台**(port 10254,UI、代理管理、密钥管理)
      - **Rust 网关**(port 10255,透明的凭证注入代理)
      - **Prisma migrations** 在容器启动时自动执行
      - **自动生成 SECRET_ENCRYPTION_KEY** 持久化到 `/app/data/`(AES-256-GCM)

      ## 工作原理

      1. 在浏览器打开 `https://your-domain.zeabur.app`
      2. 直接进入控制台(单用户模式无需登录)
      3. 创建第一个代理并获取 access token
      4. 将真实 API 密钥加入保险库
      5. 将你的 AI 代理的 HTTP client 指向网关 URL

      ```
      你的代理 → [FAKE_KEY] → OneCLI 网关 → [REAL_KEY] → 外部 API(OpenAI、GitHub 等)
                                              ↓
                                          审计日志 + 速率限制
      ```

      ## 功能

      - **透明凭证注入** — 代理正常发 HTTP 请求,网关处理认证
      - **AES-256-GCM 加密存储** — 密钥仅在请求时解密
      - **主机与路径匹配** — 将密钥路由到特定 API endpoint
      - **多代理支持** — 每个代理有自己 scoped 的 access token
      - **Rust 网关** — 快速、内存安全的 HTTP 代理(支持 MITM)
      - **两种认证模式** — 单用户(无需登录)或 Google OAuth(多用户团队)
      - **Vault 集成** — 连接 Bitwarden 按需注入凭证
      - **完整审计日志** — 查看每个代理做了什么

      ## 首次登录

      部署完成后(首次启动 + migrations 需要 2-3 分钟):

      1. 在浏览器打开 `https://your-domain.zeabur.app`
      2. 直接进入控制台(单用户模式无需登录)
      3. 创建第一个代理并获取 access token
      4. 将密钥加入保险库
      5. 将你的 AI 代理的 HTTP client 指向网关 URL

      ## 配置你的 AI 代理

      获取代理 token 和至少一个密钥后:

      ```bash
      # 示例:将 OpenAI 请求通过 OneCLI 网关
      curl https://your-domain.zeabur.app:10255/v1/chat/completions \
        -H "Authorization: Bearer <your-...n>" \
        -H "Content-Type: application/json" \
        -d '{"model":"gpt-4","messages":[{"role":"user","content":"Hello!"}]}'
      ```

      在你的代理代码中,使用 placeholder(如 `FAKE_OPENAI_KEY`),OneCLI 会自动替换为真实密钥。

      ## 部署后配置(可选)

      你可以在 Zeabur Dashboard 的 **onecli** 服务下自定义环境变量:

      **启用 Google OAuth(多用户模式):**
      - `NEXTAUTH_SECRET` → 你的 NextAuth 密钥
      - `GOOGLE_CLIENT_ID` → 你的 Google OAuth client ID
      - `GOOGLE_CLIENT_SECRET` → 你的 Google OAuth client secret

      **自定义网关端口:**
      - `GATEWAY_PORT` → 默认 10255

      ## 备注

      - 加密密钥(`SECRET_ENCRYPTION_KEY`)首次启动时自动生成并存储到 `/app/data/`。**不要丢失这个 volume** — 没了它,所有存储的密钥都不可恢复。
      - Rust 网关使用 HTTPS 拦截(MITM)来注入凭证。你的代理必须信任 OneCLI 的 CA 证书(或者在开发环境使用 `--insecure-skip-verify`)。
      - 数据库 migrations 通过 entrypoint script 自动执行。
      - All-in-one image 约 500MB(Next.js + Rust 网关),比单独部署小。

      了解更多:https://github.com/onecli/onecli

      如在部署期间遇到任何问题,请通过 GitHub issues 告知:
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
  ja-JP:
    description: "オープンソースの AI エージェント用認証情報ゲートウェイとボールト。API キーを一度保存すれば、エージェントが HTTP リクエストを行う際に透過的に注入されます — エージェントが本物のキーを目にすることはありません。"
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: ドメイン
        description: OneCLI インスタンスのドメイン(Zeabur が自動割り当て、カスタマイズ可能)
      - key: NEXTAUTH_SECRET
        type: STRING
        name: NextAuth シークレット
        description: NextAuth.js のシークレット(空欄ならシングルユーザーモード、入力すると Google OAuth が有効化)
      - key: GOOGLE_CLIENT_ID
        type: STRING
        name: Google Client ID
        description: オプション — Google OAuth クライアント ID(マルチユーザーチームモード)
      - key: GOOGLE_CLIENT_SECRET
        type: STRING
        name: Google Client Secret
        description: オプション — Google OAuth クライアントシークレット(マルチユーザーチームモード)
    readme: |-
      # OneCLI — AI エージェントのシークレットボールト(SEAFOODHOLDHAND 作成)

      **OneCLI** は AI エージェントとその呼び出し先サービスの間に位置するオープンソースの認証情報ゲートウェイです。実際の API キーを OneCLI の暗号化ボールトに保存し、エージェントにはプレースホルダー(例:`FAKE_KEY`)を渡すだけで、OneCLI ゲートウェイがリクエスト時に実際の認証情報を透過的に注入します。エージェントが本物のシークレットを見ることはありません。

      このテンプレートは OneCLI の完全なインスタンスをワンクリックでデプロイします。

      ## アーキテクチャ

      ```
      [Zeabur LB] → OneCLI アプリ(単一イメージ、2 プロセス)
                        ├─ :10254  → Next.js Web ダッシュボード(UI + API)
                        └─ :10255  → Rust ゲートウェイ(認証情報注入プロキシ)
      [PostgreSQL]  → OneCLI データベース(エージェント、シークレット、監査ログ)
      ```

      OneCLI アプリイメージ(`ghcr.io/onecli/onecli:latest`)には以下が含まれます:
      - **Next.js Web ダッシュボード**(port 10254、UI、エージェント管理、シークレット管理)
      - **Rust ゲートウェイ**(port 10255、透明な認証情報注入プロキシ)
      - **Prisma マイグレーション** コンテナ起動時に自動実行
      - **SECRET_ENCRYPTION_KEY 自動生成** `/app/data/` に永続化(AES-256-GCM)

      ## 動作の仕組み

      1. ブラウザで `https://your-domain.zeabur.app` を開く
      2. ダッシュボードに直接アクセス(シングルユーザーモードはログイン不要)
      3. 最初のエージェントを作成してアクセストークンを取得
      4. 実際の API キーをボールトに追加
      5. AI エージェントの HTTP クライアントをゲートウェイ URL に向けます

      ```
      あなたのエージェント → [FAKE_KEY] → OneCLI ゲートウェイ → [REAL_KEY] → 外部 API(OpenAI、GitHub など)
                                                       ↓
                                                   監査ログ + レート制限
      ```

      ## 主な機能

      - **透過的な認証情報注入** — エージェントは通常の HTTP リクエストを送信、ゲートウェイが認証を処理
      - **AES-256-GCM 暗号化ストレージ** — シークレットはリクエスト時にのみ復号化
      - **ホストとパスのマッチング** — 特定の API エンドポイントにシークレットをルーティング
      - **マルチエージェント対応** — 各エージェントが独自のスコープ付きアクセストークンを取得
      - **Rust ゲートウェイ** — 高速でメモリ安全な HTTP プロキシ(MITM 対応)
      - **2 つの認証モード** — シングルユーザー(ログイン不要)または Google OAuth(マルチユーザーチーム)
      - **Vault 連携** — Bitwarden を接続してオンデマンドで認証情報を注入
      - **完全な監査ログ** — すべてのエージェントの動作を確認

      ## 初回ログイン

      デプロイ完了後(初回起動 + マイグレーションに 2〜3 分):

      1. ブラウザで `https://your-domain.zeabur.app` を開く
      2. ダッシュボードに直接アクセス(シングルユーザーモードはログイン不要)
      3. 最初のエージェントを作成してアクセストークンを取得
      4. シークレットをボールトに追加
      5. AI エージェントの HTTP クライアントをゲートウェイ URL に向けます

      ## AI エージェントの設定

      エージェントトークンと少なくとも 1 つのシークレットを取得したら:

      ```bash
      # 例:OpenAI リクエストを OneCLI ゲートウェイ経由で送信
      curl https://your-domain.zeabur.app:10255/v1/chat/completions \
        -H "Authorization: Bearer <your-...n>" \
        -H "Content-Type: application/json" \
        -d '{"model":"gpt-4","messages":[{"role":"user","content":"Hello!"}]}'
      ```

      エージェントのコードでは、`FAKE_OPENAI_KEY` のようなプレースホルダーを使用してください。OneCLI が実際のキーに自動置換します。

      ## デプロイ後の設定(オプション)

      Zeabur ダッシュボードの **onecli** サービスで環境変数をカスタマイズできます:

      **Google OAuth を有効にする(マルチユーザーモード):**
      - `NEXTAUTH_SECRET` → NextAuth シークレット
      - `GOOGLE_CLIENT_ID` → Google OAuth クライアント ID
      - `GOOGLE_CLIENT_SECRET` → Google OAuth クライアントシークレット

      **ゲートウェイポートのカスタマイズ:**
      - `GATEWAY_PORT` → デフォルト 10255

      ## 注意事項

      - 暗号化キー(`SECRET_ENCRYPTION_KEY`)は初回起動時に自動生成され `/app/data/` に保存されます。**このボリュームを失わないでください** — 失うと、保存されたすべてのシークレットが復元不能になります。
      - Rust ゲートウェイは認証情報注入に HTTPS 傍受(MITM)を使用します。エージェントは OneCLI の CA 証明書を信頼する必要があります(または開発環境では `--insecure-skip-verify` を設定)。
      - データベースマイグレーションは entrypoint スクリプトにより自動実行されます。
      - All-in-one イメージは約 500MB(Next.js + Rust ゲートウェイ)。別々にデプロイするより小さくなります。

      詳細:https://github.com/onecli/onecli

      デプロイ中に問題が発生した場合は、GitHub issues でお知らせください:
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
  id-ID:
    description: "Gateway dan vault kredensial sumber terbuka untuk agen AI. Simpan kunci API sekali saja, suntikkan secara transparan saat agen Anda melakukan panggilan HTTP — mereka tidak pernah melihat kunci asli."
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: Domain
        description: Domain instance OneCLI Anda (otomatis ditetapkan oleh Zeabur, dapat disesuaikan)
      - key: NEXTAUTH_SECRET
        type: STRING
        name: NextAuth Secret
        description: Secret untuk NextAuth.js (otomatis dibuat oleh Zeabur jika kosong, mengaktifkan mode Google OAuth)
      - key: GOOGLE_CLIENT_ID
        type: STRING
        name: Google Client ID
        description: Opsional — Google OAuth client ID untuk mode tim multi-pengguna
      - key: GOOGLE_CLIENT_SECRET
        type: STRING
        name: Google Client Secret
        description: Opsional — Google OAuth client secret untuk mode tim multi-pengguna
    readme: |-
      # OneCLI — Vault Rahasia untuk Agen AI (dibuat oleh SEAFOODHOLDHAND)

      **OneCLI** adalah gateway kredensial sumber terbuka yang berada di antara agen AI Anda dan layanan yang mereka panggil. Simpan kunci API asli di vault terenkripsi OneCLI, berikan placeholder (mis. `FAKE_KEY`) kepada agen Anda, dan gateway OneCLI akan menyuntikkan kredensial asli secara transparan pada permintaan keluar — agen tidak pernah melihat rahasia asli.

      Template ini men-deploy instance OneCLI lengkap dalam satu klik.

      ## Arsitektur

      ```
      [Zeabur LB] → Aplikasi OneCLI (satu image, dua proses)
                        ├─ :10254  → Dashboard Web Next.js (UI + API)
                        └─ :10255  → Gateway Rust (proksi injeksi kredensial)
      [PostgreSQL]  → Database OneCLI (agen, rahasia, log audit)
      ```

      Image aplikasi OneCLI (`ghcr.io/onecli/onecli:latest`) mencakup:
      - **Dashboard web Next.js** di port 10254 (UI, manajemen agen, manajemen rahasia)
      - **Gateway Rust** di port 10255 (proksi injeksi kredensial transparan)
      - **Migrasi Prisma** berjalan otomatis saat container dimulai
      - **SECRET_ENCRYPTION_KEY otomatis dibuat** dan disimpan di `/app/data/` (AES-256-GCM)

      ## Cara Kerja

      1. Buka `https://your-domain.zeabur.app` di browser
      2. Anda akan langsung masuk ke dashboard (tidak perlu login dalam mode pengguna tunggal)
      3. Buat agen pertama Anda dan dapatkan access token
      4. Tambahkan kunci API asli ke vault
      5. Arahkan HTTP client agen AI Anda ke URL gateway

      ```
      Agen Anda → [FAKE_KEY] → Gateway OneCLI → [REAL_KEY] → API Eksternal (OpenAI, GitHub, dll.)
                                                    ↓
                                              Log audit + rate limit
      ```

      ## Fitur

      - **Injeksi kredensial transparan** — agen membuat panggilan HTTP normal, gateway menangani auth
      - **Enkripsi AES-256-GCM at rest** — rahasia hanya didekripsi saat permintaan
      - **Pencocokan host & path** — rutekan rahasia ke endpoint API tertentu
      - **Dukungan multi-agen** — setiap agen mendapat access token dengan scope sendiri
      - **Gateway Rust** — proksi HTTP cepat, memory-safe dengan intersepsi MITM
      - **Dua mode auth** — pengguna tunggal (tanpa login) atau Google OAuth (tim multi-pengguna)
      - **Integrasi Vault** — hubungkan Bitwarden untuk injeksi kredensial sesuai permintaan
      - **Log audit lengkap** — lihat apa yang dilakukan setiap agen

      ## Login Pertama

      Setelah deployment selesai (membutuhkan 2-3 menit untuk startup awal + migrasi):

      1. Buka `https://your-domain.zeabur.app` di browser
      2. Anda akan langsung masuk ke dashboard (tidak perlu login dalam mode pengguna tunggal)
      3. Buat agen pertama Anda dan dapatkan access token
      4. Tambahkan rahasia ke vault
      5. Arahkan HTTP client agen AI Anda ke URL gateway

      ## Konfigurasi Agen AI Anda

      Setelah Anda memiliki token agen dan setidaknya satu rahasia tersimpan:

      ```bash
      # Contoh: rutekan panggilan OpenAI melalui OneCLI
      curl https://your-domain.zeabur.app:10255/v1/chat/completions \
        -H "Authorization: Bearer <your-...n>" \
        -H "Content-Type: application/json" \
        -d '{"model":"gpt-4","messages":[{"role":"user","content":"Hello!"}]}'
      ```

      Dalam kode agen Anda, gunakan placeholder seperti `FAKE_OPENAI_KEY` dan OneCLI akan menggantinya dengan kunci asli.

      ## Konfigurasi Pasca-Deploy (Opsional)

      Sesuaikan variabel lingkungan ini di Zeabur Dashboard pada layanan **onecli**:

      **Aktifkan Google OAuth (mode multi-pengguna):**
      - `NEXTAUTH_SECRET` → NextAuth secret Anda
      - `GOOGLE_CLIENT_ID` → Google OAuth client ID Anda
      - `GOOGLE_CLIENT_SECRET` → Google OAuth client secret Anda

      **Port Gateway Kustom:**
      - `GATEWAY_PORT` → default 10255

      ## Catatan

      - Kunci enkripsi (`SECRET_ENCRYPTION_KEY`) dibuat otomatis saat start pertama dan disimpan di `/app/data/`. **Jangan hilangkan volume ini** — tanpa itu, semua rahasia yang tersimpan tidak dapat dipulihkan.
      - Gateway Rust menggunakan intersepsi HTTPS (MITM) untuk injeksi kredensial. Agen Anda harus mempercayai sertifikat CA OneCLI (atau gunakan `--insecure-skip-verify` di development).
      - Migrasi database berjalan otomatis melalui entrypoint script.
      - Image all-in-one sekitar 500MB (Next.js + Rust gateway). Lebih kecil dari menjalankannya secara terpisah.

      Pelajari lebih lanjut: https://github.com/onecli/onecli

      Jika Anda mengalami masalah selama deployment, beri tahu melalui GitHub issues:
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
  es-ES:
    description: "Pasarela y bóveda de credenciales de código abierto para agentes de IA. Almacena las claves API una vez, las inyecta de forma transparente cuando tus agentes hacen llamadas HTTP — nunca ven las claves reales."
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: Dominio
        description: Dominio de tu instancia OneCLI (asignado automáticamente por Zeabur, personalizable)
      - key: NEXTAUTH_SECRET
        type: STRING
        name: NextAuth Secret
        description: Secreto para NextAuth.js (auto-generado por Zeabur si está vacío, activa el modo Google OAuth)
      - key: GOOGLE_CLIENT_ID
        type: STRING
        name: Google Client ID
        description: Opcional — Google OAuth client ID para modo equipo multi-usuario
      - key: GOOGLE_CLIENT_SECRET
        type: STRING
        name: Google Client Secret
        description: Opcional — Google OAuth client secret para modo equipo multi-usuario
    readme: |-
      # OneCLI — Bóveda de Secretos para Agentes de IA (creado por SEAFOODHOLDHAND)

      **OneCLI** es la pasarela de credenciales de código abierto que se sitúa entre tus agentes de IA y los servicios a los que llaman. Almacena las claves API reales una vez en la bóveda cifrada de OneCLI, da a tus agentes claves placeholder (p. ej. `FAKE_KEY`), y la pasarela OneCLI inyecta las credenciales reales de forma transparente en las solicitudes salientes — los agentes nunca ven los secretos reales.

      Esta plantilla despliega una instancia completa de OneCLI con un solo clic.

      ## Arquitectura

      ```
      [Zeabur LB] → Aplicación OneCLI (una sola imagen, dos procesos)
                        ├─ :10254  → Dashboard Web Next.js (UI + API)
                        └─ :10255  → Pasarela Rust (proxy de inyección de credenciales)
      [PostgreSQL]  → Base de datos OneCLI (agentes, secretos, registros de auditoría)
      ```

      La imagen de la app OneCLI (`ghcr.io/onecli/onecli:latest`) incluye:
      - **Dashboard web Next.js** en el puerto 10254 (UI, gestión de agentes, gestión de secretos)
      - **Pasarela Rust** en el puerto 10255 (proxy transparente de inyección de credenciales)
      - **Migraciones de Prisma** se ejecutan automáticamente al iniciar el contenedor
      - **SECRET_ENCRYPTION_KEY auto-generada** y persistida en `/app/data/` (AES-256-GCM)

      ## Cómo Funciona

      1. Abre `https://your-domain.zeabur.app` en tu navegador
      2. Accederás directamente al dashboard (no requiere login en modo usuario único)
      3. Crea tu primer agente y obtén un access token
      4. Añade las claves API reales a la bóveda
      5. Dirige el cliente HTTP de tu agente de IA a la URL de la pasarela

      ```
      Tu Agente → [FAKE_KEY] → Pasarela OneCLI → [REAL_KEY] → API Externa (OpenAI, GitHub, etc.)
                                                       ↓
                                              Log de auditoría + rate limit
      ```

      ## Funcionalidades

      - **Inyección transparente de credenciales** — los agentes hacen llamadas HTTP normales, la pasarela maneja la auth
      - **Cifrado AES-256-GCM en reposo** — los secretos se descifran solo en el momento de la solicitud
      - **Coincidencia por host y ruta** — enruta secretos a endpoints específicos de API
      - **Soporte multi-agente** — cada agente obtiene su propio access token con scopes
      - **Pasarela Rust** — proxy HTTP rápido y memory-safe con intercepción MITM
      - **Dos modos de auth** — usuario único (sin login) o Google OAuth (equipos multi-usuario)
      - **Integración con Vault** — conecta Bitwarden para inyección de credenciales bajo demanda
      - **Log de auditoría completo** — ve exactamente qué está haciendo cada agente

      ## Primer Inicio de Sesión

      Después de que se complete el despliegue (puede tomar 2-3 minutos para el inicio inicial + migraciones):

      1. Abre `https://your-domain.zeabur.app` en tu navegador
      2. Accederás directamente al dashboard (no requiere login en modo usuario único)
      3. Crea tu primer agente y obtén un access token
      4. Añade secretos a la bóveda
      5. Dirige el cliente HTTP de tu agente de IA a la URL de la pasarela

      ## Configura tu Agente de IA

      Una vez que tengas un token de agente y al menos un secreto almacenado:

      ```bash
      # Ejemplo: enrutar llamadas de OpenAI a través de OneCLI
      curl https://your-domain.zeabur.app:10255/v1/chat/completions \
        -H "Authorization: Bearer <your-...n>" \
        -H "Content-Type: application/json" \
        -d '{"model":"gpt-4","messages":[{"role":"user","content":"Hello!"}]}'
      ```

      En el código de tu agente, simplemente usa un placeholder como `FAKE_OPENAI_KEY` y OneCLI lo intercambiará por la clave real.

      ## Configuración Post-Despliegue (Opcional)

      Personaliza estas variables de entorno en el panel de Zeabur bajo el servicio **onecli**:

      **Habilitar Google OAuth (modo multi-usuario):**
      - `NEXTAUTH_SECRET` → tu NextAuth secret
      - `GOOGLE_CLIENT_ID` → tu Google OAuth client ID
      - `GOOGLE_CLIENT_SECRET` → tu Google OAuth client secret

      **Puerto de Pasarela Personalizado:**
      - `GATEWAY_PORT` → por defecto 10255

      ## Notas

      - La clave de cifrado (`SECRET_ENCRYPTION_KEY`) se genera automáticamente en el primer inicio y se persiste en `/app/data/`. **No pierdas este volumen** — sin él, todos los secretos almacenados son irrecuperables.
      - La pasarela Rust usa intercepción HTTPS (MITM) para inyectar credenciales. Tu agente debe confiar en el certificado CA de OneCLI (o usar `--insecure-skip-verify` en desarrollo).
      - Las migraciones de base de datos se ejecutan automáticamente a través del script de entrypoint.
      - La imagen all-in-one pesa ~500MB (Next.js + pasarela Rust). Más pequeño que ejecutarlos por separado.

      Más información: https://github.com/onecli/onecli

      Si encuentras algún problema durante el despliegue, avísanos a través de GitHub issues:
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
services:
    # ───────────────────────────────────────────────
    # PostgreSQL Database
    # ───────────────────────────────────────────────
    - name: PostgreSQL
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: postgres:18-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: pg-data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_USER:
            default: onecli
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_DB:
            default: onecli
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true

    # ───────────────────────────────────────────────
    # OneCLI App (Web Dashboard + Rust Gateway)
    # ───────────────────────────────────────────────
    - name: onecli
      icon: https://raw.githubusercontent.com/onecli/onecli/main/assets/onecli-logo-light.gif
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - PostgreSQL
      spec:
        source:
          image: ghcr.io/onecli/onecli:latest
        ports:
          - id: web
            port: 10254
            type: HTTP
          - id: gateway
            port: 10255
            type: HTTP
        volumes:
          - id: onecli-data
            dir: /app/data
        env:
          # ── Container Config ──
          HOSTNAME:
            default: "0.0.0.0"
            expose: false

          # ── Database ──
          DATABASE_URL:
            default: postgresql://${POSTGRES_USER}:***@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
            expose: false

          # ── Auth: behind proxy, must trust host header ──
          AUTH_TRUST_HOST:
            default: "true"
            expose: false

          # ── URLs ──
          APP_URL:
            default: https://${ZEABUR_WEB_DOMAIN}
            expose: false
          NEXTAUTH_URL:
            default: https://${ZEABUR_WEB_DOMAIN}
            expose: false
          GATEWAY_API_URL:
            default: https://${ZEABUR_WEB_DOMAIN}:10255
            expose: false

          # ── NextAuth ──
          NEXTAUTH_SECRET:
            default: ${NEXTAUTH_SECRET}
            expose: false

          # ── Google OAuth (optional) ──
          GOOGLE_CLIENT_ID:
            default: ${GOOGLE_CLIENT_ID}
            expose: false
          GOOGLE_CLIENT_SECRET:
            default: ${GOOGLE_CLIENT_SECRET}
            expose: false

          # ── Gateway Port ──
          GATEWAY_PORT:
            default: "10255"
            expose: false
