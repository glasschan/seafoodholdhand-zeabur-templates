apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OneCLI
spec:
  description: "Open-source credential gateway and vault for AI agents. Store API keys once, inject them transparently when your agents make HTTP calls — they never see the real secrets."
  icon: https://raw.githubusercontent.com/onecli/onecli/main/assets/onecli-logo-light.gif
  coverImage: https://raw.githubusercontent.com/onecli/onecli/main/assets/onecli-flow-light.gif
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: Your OneCLI instance domain (auto-assigned by Zeabur, customizable)
    - key: NEXTAUTH_SECRET
      type: STRING
      name: NextAuth Secret
      description: Secret for NextAuth.js (auto-generated by Zeabur if empty, enables Google OAuth mode)
    - key: GOOGLE_CLIENT_ID
      type: STRING
      name: Google Client ID
      description: Optional — Google OAuth client ID for multi-user team mode
    - key: GOOGLE_CLIENT_SECRET
      type: STRING
      name: Google Client Secret
      description: Optional — Google OAuth client secret for multi-user team mode
  tags:
    - AI
    - Security
    - Vault
    - Credentials
    - AI Agents
    - Gateway
  readme: |-
    # OneCLI — Secret Vault for AI Agents (create by SEAFOODHOLDHAND)

    **OneCLI** is the open-source credential gateway that sits between your AI agents and the services they call. Store real API keys once in OneCLI's encrypted vault, give your agents placeholder keys (e.g. `FAKE_KEY`), and OneCLI's gateway injects the real credentials transparently on outbound requests — agents never see the real secrets.

    This template deploys a complete OneCLI instance with a single click.

    ## Architecture

    ```
    [Zeabur LB] → OneCLI App (single image, two processes)
                      ├─ :10254  → Next.js Web Dashboard (UI + API)
                      └─ :10255  → Rust Gateway (credential injection proxy)
    [PostgreSQL]   → OneCLI database (agents, secrets, audit logs)
    ```

    The OneCLI app image (`ghcr.io/onecli/onecli:latest`) bundles:
    - **Next.js web dashboard** on port 10254 (UI, agent management, secret management)
    - **Rust gateway** on port 10255 (transparent credential injection proxy)
    - **Prisma migrations** run automatically on container start
    - **Auto-generated SECRET_ENCRYPTION_KEY** persisted to `/app/data/` (AES-256-GCM)

    ## How It Works

    1. **Open the dashboard** at `https://your-domain.zeabur.app`
    2. **Create an agent** and get an access token
    3. **Store real API keys** in OneCLI's encrypted vault (e.g. OpenAI, GitHub, Stripe)
    4. **Configure your agent** to route HTTP traffic through `https://your-domain.zeabur.app:10255`
    5. **Give your agent a placeholder** (e.g. `Bearer FAKE_KEY`) — when it makes a request, the gateway swaps it for the real credential

    ```
    Your Agent → [FAKE_KEY] → OneCLI Gateway → [REAL_KEY] → External API (OpenAI, GitHub, etc.)
                                          ↓
                                  Audit log + rate limit
    ```

    ## Features

    - **Transparent credential injection** — agents make normal HTTP calls, gateway handles auth
    - **AES-256-GCM encryption at rest** — secrets decrypted only at request time
    - **Host & path matching** — route secrets to specific API endpoints
    - **Multi-agent support** — each agent gets its own scoped access token
    - **Rust gateway** — fast, memory-safe HTTP proxy with MITM interception
    - **Two auth modes** — single-user (no login, default) or Google OAuth (multi-user teams)
    - **Vault integration** — connect Bitwarden for on-demand credential injection
    - **Full audit log** — see exactly what every agent is doing

    ## First Login

    After deployment completes (may take 2-3 minutes for initial startup + migrations):

    1. Open `https://your-domain.zeabur.app` in your browser
    2. You'll land directly on the dashboard (no login required in single-user mode)
    3. Create your first agent and grab its access token
    4. Add secrets to the vault
    5. Point your AI agent's HTTP client to the gateway URL

    ## Configure Your AI Agent

    Once you have an agent token and at least one secret stored:

    ```bash
    # Example: route OpenAI calls through OneCLI
    curl https://your-domain.zeabur.app:10255/v1/chat/completions \
      -H "Authorization: Bearer <your-...n>" \
      -H "Content-Type: application/json" \
      -d '{"model":"gpt-4","messages":[{"role":"user","content":"Hello!"}]}'
    ```

    In your agent code, just use a placeholder like `FAKE_OPENAI_KEY` and OneCLI swaps it for the real key.

    ## Post-Deployment Configuration (Optional)

    Customize these environment variables in the Zeabur Dashboard under the **onecli** service:

    ### Enable Google OAuth (multi-user mode)
    - `NEXTAUTH_SECRET` → your NextAuth secret
    - `GOOGLE_CLIENT_ID` → your Google OAuth client ID
    - `GOOGLE_CLIENT_SECRET` → your Google OAuth client secret

    ### Custom Gateway Port
    - `GATEWAY_PORT` → default 10255

    ## Notes

    - The encryption key (`SECRET_ENCRYPTION_KEY`) is auto-generated on first start and persisted to `/app/data/`. **Don't lose this volume** — without it, all stored secrets are unrecoverable.
    - The Rust gateway uses HTTPS interception (MITM) for credential injection. Your agent must trust the OneCLI CA cert (or set `--insecure-skip-verify` in development).
    - Database migrations run automatically via the entrypoint script.
    - The all-in-one image is ~500MB (Next.js + Rust gateway). Smaller than running separately.

    Learn more: https://github.com/onecli/onecli

    If you encounter any issues during deployment, please let me know via GitHub issues:
    [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)

localization:
  zh-TW:
    description: "開源 AI 代理憑證閘道與保險庫。一次儲存 API 金鑰，代理發出 HTTP 請求時自動注入 — 代理永遠唔會見到真實密鑰。"
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: 網域
        description: 你的 OneCLI 網域（Zeabur 自動分配，可自訂）
      - key: NEXTAUTH_SECRET
        type: STRING
        name: NextAuth 密鑰
        description: NextAuth.js 密鑰（Zeabur 自動產生，填咗會啟用 Google OAuth 模式）
      - key: GOOGLE_CLIENT_ID
        type: STRING
        name: Google Client ID
        description: 可選 — Google OAuth client ID（多用戶團隊模式）
      - key: GOOGLE_CLIENT_SECRET
        type: STRING
        name: Google Client Secret
        description: 可選 — Google OAuth client secret（多用戶團隊模式）
    readme: |-
      # OneCLI — AI 代理的密鑰保險庫（由 SEAFOODHOLDHAND 建立）

      **OneCLI** 係開源嘅憑證閘道，企喺你嘅 AI 代理同外部服務之間。將真實 API 金鑰儲存喺 OneCLI 嘅加密保險庫入面，俾代理一個 placeholder（例如 `FAKE_KEY`），OneCLI 閘道就會喺請求時自動換成真實憑證 — 代理永遠唔會見到真實密鑰。

      此模板一鍵部署完整嘅 OneCLI 實例。

      ## 架構

      ```
      [Zeabur LB] → OneCLI 應用（單一 image，兩個 process）
                        ├─ :10254  → Next.js 網頁控制台（UI + API）
                        └─ :10255  → Rust 閘道（憑證注入代理）
      [PostgreSQL]  → OneCLI 資料庫（代理、密鑰、審計日誌）
      ```

      OneCLI app image (`ghcr.io/onecli/onecli:latest`) 包含：
      - **Next.js 網頁控制台**（port 10254，UI、代理管理、密鑰管理）
      - **Rust 閘道**（port 10255，透明嘅憑證注入代理）
      - **Prisma migrations** 喺容器啟動時自動執行
      - **自動產生 SECRET_ENCRYPTION_KEY** 持久化喺 `/app/data/`（AES-256-GCM）

      ## 點樣運作

      1. 喺瀏覽器打開 `https://your-domain.zeabur.app`
      2. 直接進入控制台（單用戶模式無需登入）
      3. 建立第一個代理並取得 access token
      4. 將真實 API 金鑰加入保險庫
      5. 將你 AI 代理嘅 HTTP client 指向閘道 URL

      ```
      你的代理 → [FAKE_KEY] → OneCLI 閘道 → [REAL_KEY] → 外部 API（OpenAI、GitHub 等）
                                              ↓
                                          審計日誌 + 速率限制
      ```

      ## 功能

      - **透明憑證注入** — 代理正常發 HTTP 請求，閘道處理認證
      - **AES-256-GCM 加密儲存** — 密鑰只喺請求時解密
      - **主機同路徑匹配** — 將密鑰路由到特定 API endpoint
      - **多代理支援** — 每個代理有自己嘅 scoped access token
      - **Rust 閘道** — 快速、記憶體安全嘅 HTTP 代理（支援 MITM）
      - **兩種認證模式** — 單用戶（無需登入）或 Google OAuth（多用戶團隊）
      - **Vault 整合** — 接駁 Bitwarden 隨需注入憑證
      - **完整審計日誌** — 睇到每個代理做咗咩

      ## 首次登入

      部署完成後（首次啟動 + migrations 需要 2-3 分鐘）：

      1. 喺瀏覽器打開 `https://your-domain.zeabur.app`
      2. 直接進入控制台（單用戶模式無需登入）
      3. 建立第一個代理並取得 access token
      4. 將密鑰加入保險庫
      5. 將你 AI 代理嘅 HTTP client 指向閘道 URL

      ## 配置你嘅 AI 代理

      取得代理 token 同至少一個密鑰後：

      ```bash
      # 範例：將 OpenAI 請求經 OneCLI 閘道
      curl https://your-domain.zeabur.app:10255/v1/chat/completions \
        -H "Authorization: Bearer <your-...n>" \
        -H "Content-Type: application/json" \
        -d '{"model":"gpt-4","messages":[{"role":"user","content":"Hello!"}]}'
      ```

      喺你嘅代理代碼入面，用 placeholder（例如 `FAKE_OPENAI_KEY`），OneCLI 會自動換成真實金鑰。

      ## 部署後配置（可選）

      你可以喺 Zeabur Dashboard 嘅 **onecli** 服務下自訂環境變數：

      **啟用 Google OAuth（多用戶模式）：**
      - `NEXTAUTH_SECRET` → 你的 NextAuth 密鑰
      - `GOOGLE_CLIENT_ID` → 你的 Google OAuth client ID
      - `GOOGLE_CLIENT_SECRET` → 你的 Google OAuth client secret

      **自訂閘道端口：**
      - `GATEWAY_PORT` → 預設 10255

      ## 備註

      - 加密金鑰（`SECRET_ENCRYPTION_KEY`）首次啟動時自動產生並儲存喺 `/app/data/`。**唔好唔見咗呢個 volume** — 冇咗佢，所有儲存嘅密鑰都無法復原。
      - Rust 閘道用 HTTPS 攔截（MITM）嚟注入憑證。你嘅代理必須信任 OneCLI 嘅 CA 證書（或者喺開發環境用 `--insecure-skip-verify`）。
      - 資料庫 migrations 透過 entrypoint script 自動執行。
      - All-in-one image 約 500MB（Next.js + Rust 閘道），比分開部署細。

      了解更多：https://github.com/onecli/onecli

      如喺部署期間遇到任何問題，請透過 GitHub issues 告知：
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
