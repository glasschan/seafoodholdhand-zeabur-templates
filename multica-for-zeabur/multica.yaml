# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Multica
spec:
  description: Open-source managed agents platform — turn coding agents into real teammates
  icon: https://raw.githubusercontent.com/multica-ai/multica/main/docs/assets/logo-dark.svg
  coverImage: https://raw.githubusercontent.com/multica-ai/multica/main/docs/assets/banner.jpg
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: What is the domain you want for your Multica instance?
    - key: RESEND_API_KEY
      type: STRING
      name: Resend API Key
      description: Your Resend (resend.com) API key for sending verification emails. Leave empty to get codes from backend logs instead.
    - key: RESEND_FROM_EMAIL
      type: STRING
      name: Resend From Email
      description: The verified sender email address from your Resend (resend.com) account, e.g. noreply@yourdomain.com.
  tags:
    - AI
    - Agents
    - Productivity
    - Automation
  readme: |-
    # Multica — Managed Agents Platform (create by SEAFOODHOLDHAND)

    **Multica** turns coding agents into real teammates. Assign issues to an agent like you'd assign to a colleague — they'll pick up the work, write code, report blockers, and update statuses autonomously.

    This template includes:

    - **Multica Backend** — Go API + WebSocket server
    - **Multica Frontend** — Next.js web application
    - **PostgreSQL 17 + pgvector** — database with vector extension
    - **Caddy Gateway** — reverse proxy for unified access (API, WebSocket, and web)

    ## Features

    - **Agents as Teammates** — assign to an agent like you'd assign to a colleague
    - **Squads** — group agents under a leader for stable routing
    - **Autonomous Execution** — full task lifecycle with real-time progress via WebSocket
    - **Autopilots** — schedule recurring work for agents (cron, webhooks, manual)
    - **Reusable Skills** — every solution becomes a reusable skill for the team
    - **Unified Runtimes** — one dashboard for all your compute
    - **Multi-Workspace** — workspace-level isolation for different teams

    Supports: Claude Code, Codex, GitHub Copilot CLI, OpenClaw, OpenCode, Hermes, Gemini, Pi, Cursor Agent, Kimi, Kiro CLI

    ## Login Setup

    This template defaults to `APP_ENV=production`. To log in, enter your email on the login page, then get the verification code by one of these methods:

    - **Recommended:** set `RESEND_API_KEY` (your Resend API key from resend.com) and `RESEND_FROM_EMAIL` (a verified sender email, e.g. noreply@yourdomain.com) during setup → verification code will be sent to your email
    - **Without Resend:** open the **Backend** service logs in Zeabur Dashboard → search for `[DEV] Verification code for` → copy the 6-digit code and paste it on the login page

    > **URL not working?** The Gateway service uses `${ZEABUR_WEB_URL}` to auto-detect its public URL. If the login page or API fails to load after deployment, go to **Zeabur Dashboard → Gateway → Variables → APP_URL**, manually set it to your Multica domain (e.g. `https://your-multica.zeabur.app`), then restart the Gateway service.

    ## After Deployment

    1. Open your workspace in the web app
    2. Install the Multica CLI: `brew install multica-ai/tap/multica`
    3. Configure the CLI (replace with your actual domain):
       ```bash
       multica setup self-host --server-url https://your-multica-domain.zeabur.app --app-url https://your-multica-domain.zeabur.app
       ```
       For on-premise deployments with custom domains:
       ```bash
       multica setup self-host --server-url https://app.example.com --app-url https://app.example.com
       ```
    4. Create an agent and start assigning tasks!

    Learn more: https://github.com/multica-ai/multica

    If you encounter any issues during deployment, please let me know via GitHub issues:
    [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
  services:
    - name: PostgreSQL
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT_V2
      spec:
        source:
          image: pgvector/pgvector:pg17
          command:
            - docker-entrypoint.sh
            - -c
            - config_file=/etc/postgresql/postgresql.conf
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        instructions:
          - type: TEXT
            title: Connection String
            content: postgresql://${POSTGRES_USERNAME}:***@${PORT_FORWARDED_HOSTNAME}:${DATABASE_PORT_FORWARDED_PORT}/${POSTGRES_DATABASE}
          - type: TEXT
            title: PostgreSQL Connect Command
            content: psql "postgresql://${POSTGRES_USERNAME}:***@${PORT_FORWARDED_HOSTNAME}:${DATABASE_PORT_FORWARDED_PORT}/${POSTGRES_DATABASE}"
          - type: TEXT
            title: PostgreSQL username
            content: ${POSTGRES_USERNAME}
            category: Credentials
          - type: PASSWORD
            title: PostgreSQL password
            content: ${POSTGRES_PASSWORD}
            category: Credentials
          - type: TEXT
            title: PostgreSQL database
            content: ${POSTGRES_DATABASE}
            category: Credentials
          - type: TEXT
            title: PostgreSQL host
            content: ${PORT_FORWARDED_HOSTNAME}
            category: Hostname & Port
          - type: TEXT
            title: PostgreSQL port
            content: ${DATABASE_PORT_FORWARDED_PORT}
            category: Hostname & Port
        env:
          PGDATA:
            default: /var/lib/postgresql/data/pgdata
            expose: false
          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USERNAME}:***@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}
            expose: false
          POSTGRES_DATABASE:
            default: ${POSTGRES_DB}
            expose: true
          POSTGRES_DB:
            default: multica
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
          POSTGRES_URI:
            default: ${POSTGRES_CONNECTION_STRING}
            expose: true
          POSTGRES_USER:
            default: multica
            expose: false
          POSTGRES_USERNAME:
            default: ${POSTGRES_USER}
            expose: true
        configs:
          - path: /etc/postgresql/postgresql.conf
            template: |-
              listen_addresses = '*'
              max_connections = 100
              shared_buffers = 128MB
              dynamic_shared_memory_type = posix
              max_wal_size = 1GB
              min_wal_size = 80MB
              log_timezone = 'Etc/UTC'
              datestyle = 'iso, mdy'
              timezone = 'Etc/UTC'
              lc_messages = 'en_US.utf8'
              lc_monetary = 'en_US.utf8'
              lc_numeric = 'en_US.utf8'
              lc_time = 'en_US.utf8'
              default_text_search_config = 'pg_catalog.english'
    - name: backend
      icon: https://raw.githubusercontent.com/multica-ai/multica/main/docs/assets/logo-dark.svg
      template: PREBUILT_V2
      dependencies:
        - PostgreSQL
      spec:
        source:
          image: ghcr.io/multica-ai/multica-backend:latest
        ports:
          - id: api
            port: 8080
            type: HTTP
        volumes:
          - id: uploads
            dir: /app/data/uploads
        instructions:
          - type: PASSWORD
            title: JWT Secret
            content: ${PASSWORD}
            category: Credentials
        env:
          DATABASE_URL:
            default: postgres://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
            expose: false
          PORT:
            default: "8080"
            expose: false
          JWT_SECRET:
            default: ${PASSWORD}
            expose: false
          APP_ENV:
            default: production
            expose: false
          FRONTEND_ORIGIN:
            default: https://${PUBLIC_DOMAIN}
            expose: false
          CORS_ALLOWED_ORIGINS:
            default: https://${PUBLIC_DOMAIN}
            expose: false
          MULTICA_APP_URL:
            default: https://${PUBLIC_DOMAIN}
            expose: false
          MULTICA_PUBLIC_URL:
            default: https://${PUBLIC_DOMAIN}
            expose: false
          ALLOW_SIGNUP:
            default: "true"
            expose: false
          RESEND_API_KEY:
            default: ${RESEND_API_KEY}
            expose: false
          RESEND_FROM_EMAIL:
            default: ${RESEND_FROM_EMAIL}
            expose: false
        configs: []
    - name: frontend
      icon: https://raw.githubusercontent.com/multica-ai/multica/main/docs/assets/logo-dark.svg
      template: PREBUILT_V2
      dependencies:
        - backend
      spec:
        source:
          image: ghcr.io/multica-ai/multica-web:latest
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          HOSTNAME:
            default: "0.0.0.0"
            expose: false
          REMOTE_API_URL:
            default: http://backend:8080
            expose: false
        configs: []
    - name: gateway
      icon: https://raw.githubusercontent.com/multica-ai/multica/main/docs/assets/logo-dark.svg
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - frontend
        - backend
      spec:
        source:
          image: caddy:2-alpine
        ports:
          - id: proxy
            port: 3000
            type: HTTP
        configs:
          - path: /etc/caddy/Caddyfile
            template: |-
              :3000 {
                  handle /ws {
                      reverse_proxy backend:8080
                  }
                  handle /health {
                      reverse_proxy backend:8080
                  }
                  handle /readyz {
                      reverse_proxy backend:8080
                  }
                  handle /api/* {
                      reverse_proxy backend:8080
                  }
                  handle /auth/* {
                      reverse_proxy backend:8080
                  }
                  handle /uploads/* {
                      reverse_proxy backend:8080
                  }
                  handle {
                      reverse_proxy frontend:3000
                  }
              }
localization:
  zh-CN:
    description: 开源托管代理平台 — 将编程代理变成真正的队友
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: 域名
        description: 你想将 Multica 绑定到哪个域名上？
      - key: RESEND_API_KEY
        type: STRING
        name: Resend API 密钥
        description: 你的 Resend（resend.com）API 密钥，用于发送验证邮件。留空则需从后端日志获取验证码。
      - key: RESEND_FROM_EMAIL
        type: STRING
        name: Resend 发件邮箱
        description: 你在 Resend（resend.com）账户中验证的发件邮箱地址，如 noreply@yourdomain.com。
    readme: |-
      # Multica — 托管代理平台 (create by SEAFOODHOLDHAND)

      **Multica** 将编程代理变成真正的队友。像给同事分配任务一样给代理分配工作 — 它们会自动接手、编写代码、报告障碍并更新状态。

      此模板包含：

      - **Multica 后端** — Go API + WebSocket 服务器
      - **Multica 前端** — Next.js 网页应用
      - **PostgreSQL 17 + pgvector** — 带向量扩展的数据库
      - **Caddy 网关** — 反向代理，统一访问（API、WebSocket 和网页）

      ## 功能特点

      - **代理即队友** — 像给同事分配任务一样分配给代理
      - **小队** — 在领导代理下分组代理，实现稳定路由
      - **自主执行** — 通过 WebSocket 实时推送进度的完整任务生命周期
      - **自动驾驶** — 为代理安排周期性工作（cron、webhook、手动）
      - **可复用技能** — 每个解决方案都成为团队可复用的技能
      - **统一运行时** — 一个仪表盘管理所有计算资源
      - **多工作区** — 不同团队的工作区级别隔离

      支持：Claude Code、Codex、GitHub Copilot CLI、OpenClaw、OpenCode、Hermes、Gemini、Pi、Cursor Agent、Kimi、Kiro CLI

      ## 登录设置

      此模板默认 `APP_ENV=production`。登录时在登录页面输入你的邮箱，然后通过以下方式获取验证码：

      - **推荐：** 在设置时配置 `RESEND_API_KEY`（你的 Resend API 密钥，来自 resend.com）和 `RESEND_FROM_EMAIL`（已验证的发件邮箱，如 noreply@yourdomain.com）→ 验证码会发送到你的邮箱
      - **没有 Resend：** 打开 Zeabur 控制台中的 **Backend** 服务日志 → 搜索 `[DEV] Verification code for` → 复制 6 位验证码并粘贴到登录页面

      > **URL 无法访问？** Gateway 服务使用 `${ZEABUR_WEB_URL}` 自动检测公共 URL。如果部署后登录页面或 API 无法加载，请前往 **Zeabur 控制台 → Gateway → Variables → APP_URL**，手动设置为你的 Multica 域名（如 `https://your-multica.zeabur.app`），然后重启 Gateway 服务。

      ## 部署后

      1. 在网页应用中打开你的工作区
      2. 安装 Multica CLI：`brew install multica-ai/tap/multica`
      3. 配置 CLI（替换为你的实际域名）：
         ```bash
         multica setup self-host --server-url https://your-multica-domain.zeabur.app --app-url https://your-multica-domain.zeabur.app
         ```
         自建部署使用自定义域名：
         ```bash
         multica setup self-host --server-url https://app.example.com --app-url https://app.example.com
         ```
      4. 创建代理并开始分配任务！

      了解更多：https://github.com/multica-ai/multica

      如在部署时遇到任何问题，可以通过 GitHub Issues 反馈：
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)

