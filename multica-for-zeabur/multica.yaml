    readme: |-
      # Multica — Plataforma de agentes gestionados (create by SEAFOODHOLDHAND)

      **Multica** convierte los agentes de código en verdaderos compañeros de equipo. Asigna tareas a un agente como se las asignarías a un compañero — recogerán el trabajo, escribirán código, informarán de bloqueos y actualizarán estados de forma autónoma.

      Esta plantilla incluye:

      - **Backend de Multica** — API en Go + servidor WebSocket
      - **Frontend de Multica** — Aplicación web Next.js
      - **PostgreSQL 17 + pgvector** — Base de datos con extensión vectorial
      - **Gateway Caddy** — Proxy inverso para acceso unificado (API, WebSocket y web)

      ## Características

      - **Agentes como compañeros** — asigna tareas a un agente como lo harías con un compañero
      - **Escuadrones** — agrupa agentes bajo un líder para un enrutamiento estable
      - **Ejecución autónoma** — ciclo de vida completo de tareas con progreso en tiempo real vía WebSocket
      - **Autopiloto** — programa tareas recurrentes para los agentes (cron, webhooks, manual)
      - **Habilidades reutilizables** — cada solución se convierte en una habilidad reutilizable para el equipo
      - **Runtimes unificados** — un panel para todos tus recursos de cómputo
      - **Multi-espacio de trabajo** — aislamiento a nivel de espacio de trabajo para diferentes equipos

      Soporta: Claude Code, Codex, GitHub Copilot CLI, OpenClaw, OpenCode, Hermes, Gemini, Pi, Cursor Agent, Kimi, Kiro CLI

      ## Configuración de inicio de sesión

      Esta plantilla usa `APP_ENV=production` por defecto. Para iniciar sesión, ingresa tu correo electrónico en la página de login y obtén el código de verificación mediante uno de estos métodos:

      - **Recomendado:** configura `RESEND_API_KEY` (tu clave de API de Resend desde resend.com) y `RESEND_FROM_EMAIL` (tu dirección de correo electrónico del remitente verificada, por ejemplo, noreply@tudominio.com) durante la instalación → el código de verificación se enviará a tu correo electrónico
      - **Sin Resend:** abre los registros del servicio **Backend** en el panel de Zeabur → busca `[DEV] Verification code for` → copia el código de 6 dígitos y pégalo en la página de login

      > **¿URL no accesible?** El servicio Gateway utiliza `${ZEABUR_WEB_URL}` para detectar automáticamente su URL pública. Si la página de login o la API no se cargan después del despliegue, ve a **Panel de Zeabur → Gateway → Variables → APP_URL**, configúralo manualmente con tu dominio de Multica (por ejemplo, `https://your-multica.zeabur.app`), y luego reinicia el servicio Gateway.

      ## Después del despliegue

      1. Abre tu espacio de trabajo en la aplicación web
      2. Instala la CLI de Multica: `brew install multica-ai/tap/multica`
      3. Configura la CLI (reemplaza con tu dominio real):
         ```bash
         multica setup self-host --server-url https://tu-dominio-multica.zeabur.app --app-url https://tu-dominio-multica.zeabur.app
         ```
         Para despliegues on-premise con dominios personalizados:
         ```bash
         multica setup self-host --server-url https://app.ejemplo.com --app-url https://app.ejemplo.com
         ```
      4. ¡Crea un agente y comienza a asignar tareas!

      Más información: https://github.com/multica-ai/multica

      Si encuentras algún problema durante el despliegue, avísame a través de GitHub issues:
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)
