        type: DOMAIN
        name: Domain
        description: Domain apa yang ingin Anda gunakan untuk instansi Multica Anda?
      - key: RESEND_API_KEY
        type: STRING
        name: Kunci API Resend
        description: Kunci API Resend (resend.com) Anda untuk mengirim email verifikasi. Biarkan kosong untuk mendapatkan kode dari log backend.
      - key: RESEND_FROM_EMAIL
        type: STRING
        name: Email Pengirim Resend
        description: Alamat email pengirim yang terverifikasi dari akun Resend (resend.com) Anda, mis. noreply@yourdomain.com.
    readme: |-
      # Multica — Platform Agen Terkelola (create by SEAFOODHOLDHAND)

      **Multica** mengubah agen coding menjadi rekan tim yang sesungguhnya. Serahkan tugas ke agen seperti Anda menyerahkan ke rekan kerja — mereka akan mengambil pekerjaan, menulis kode, melaporkan hambatan, dan memperbarui status secara mandiri.

      Template ini mencakup:

      - **Backend Multica** — Go API + server WebSocket
      - **Frontend Multica** — Aplikasi web Next.js
      - **PostgreSQL 17 + pgvector** — Database dengan ekstensi vektor
      - **Gateway Caddy** — Reverse proxy untuk akses terpadu (API, WebSocket, dan web)

      ## Fitur

      - **Agen sebagai Rekan Tim** — serahkan tugas ke agen seperti menyerahkan ke rekan kerja
      - **Skuad** — kelompokkan agen di bawah agen pemimpin untuk routing yang stabil
      - **Eksekusi Mandiri** — siklus hidup tugas lengkap dengan progres real-time melalui WebSocket
      - **Autopilot** — jadwalkan pekerjaan berulang untuk agen (cron, webhook, manual)
      - **Keterampilan yang Dapat Digunakan Ulang** — setiap solusi menjadi keterampilan yang dapat digunakan ulang oleh tim
      - **Runtime Terpadu** — satu dasbor untuk semua sumber daya komputasi Anda
      - **Multi-Workspace** — isolasi tingkat workspace untuk tim yang berbeda

      Didukung: Claude Code, Codex, GitHub Copilot CLI, OpenClaw, OpenCode, Hermes, Gemini, Pi, Cursor Agent, Kimi, Kiro CLI

      ## Pengaturan Login

      Template ini secara default menggunakan `APP_ENV=production`. Untuk login, masukkan email Anda di halaman login, lalu dapatkan kode verifikasi melalui salah satu cara berikut:

      - **Direkomendasikan:** atur `RESEND_API_KEY` (kunci API Resend Anda dari resend.com) dan `RESEND_FROM_EMAIL` (alamat email pengirim yang terverifikasi, mis. noreply@yourdomain.com) saat konfigurasi → kode verifikasi akan dikirim ke email Anda
      - **Tanpa Resend:** buka log layanan **Backend** di Dasbor Zeabur → cari `[DEV] Verification code for` → salin kode 6 digit dan tempelkan di halaman login

      > **URL tidak dapat diakses?** Layanan Gateway menggunakan `${ZEABUR_WEB_URL}` untuk mendeteksi URL publik secara otomatis. Jika halaman login atau API tidak dapat dimuat setelah deployment, buka **Dasbor Zeabur → Gateway → Variables → APP_URL**, atur secara manual ke domain Multica Anda (mis. `https://your-multica.zeabur.app`), lalu mulai ulang layanan Gateway.

      ## Setelah Deployment

      1. Buka workspace Anda di aplikasi web
      2. Instal Multica CLI: `brew install multica-ai/tap/multica`
      3. Konfigurasi CLI (ganti dengan domain aktual Anda):
         ```bash
         multica setup self-host --server-url https://your-multica-domain.zeabur.app --app-url https://your-multica-domain.zeabur.app
         ```
         Untuk deployment on-premise dengan domain kustom:
         ```bash
         multica setup self-host --server-url https://app.example.com --app-url https://app.example.com
         ```
      4. Buat agen dan mulai serahkan tugas!

      Pelajari lebih lanjut: https://github.com/multica-ai/multica

      Jika Anda mengalami masalah selama deployment, silakan beritahu saya melalui GitHub issues:
      [https://github.com/glasschan/seafoodholdhand-zeabur-templates](https://github.com/glasschan/seafoodholdhand-zeabur-templates)

  es-ES:
    description: Plataforma de agentes gestionados de código abierto — convierte agentes de código en verdaderos compañeros de equipo
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: Dominio
        description: "¿Qué dominio quieres usar para tu instancia de Multica?"
      - key: RESEND_API_KEY
        type: STRING
        name: Clave API de Resend
        description: Tu clave de API de Resend (resend.com) para enviar correos de verificación. Déjalo vacío para obtener códigos de los logs del backend.
      - key: RESEND_FROM_EMAIL
        type: STRING
        name: Email de Remitente Resend
